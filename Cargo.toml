[package]
name = "exr-analyzer"
version = "1.2.1"
edition = "2024"

[dependencies]
eframe = { version = "0.34.3", features = ["persistence", "wgpu"] }
egui = "0.34.3"
serde = { version = "1.0", features = ["derive"] }
egui_extras = { version = "0.34.3", features = ["image", "all_loaders"] }
env_logger = "0.11.10"
exr = "1.74.0"
log = "0.4.30"
rfd = "0.17.2"
smallvec = "1.15.1"
bytemuck = { version = "1.16", features = ["derive"] }
rayon = "1.12.0"
