[package]
name = "floki"
version = "1.4.4"
edition = "2024"

[workspace]
members = [".", "floki-ocio"]

[features]
default = []
# Enables OpenColorIO support. Pulls in the floki-ocio crate, which builds a
# native OCIO via cmake (vendored). Off by default so the standard build needs
# no C++ toolchain. See plans/i-want-to-map-modular-hinton.md.
ocio = ["dep:floki-ocio"]

[dependencies]
# Dev uses system-ocio (links the installed OpenColorIO). Switch to "vendored-ocio"
# for self-contained distributable builds once the cmake wiring lands.
floki-ocio = { path = "floki-ocio", optional = true, features = ["system-ocio"] }
eframe = { version = "0.34.3", features = ["persistence", "wgpu"] }
egui = "0.34.3"
serde = { version = "1.0", features = ["derive"] }
egui_extras = { version = "0.34.3", features = ["image", "all_loaders"] }
env_logger = "0.11.10"
exr = "1.74.0"
log = "0.4.30"
rfd = "0.17.2"
smallvec = "1.15.1"
bytemuck = { version = "1.16", features = ["derive"] }
rayon = "1.12.0"

[dev-dependencies]
tempfile = "3"          # scoped temp dirs/files for test fixtures (auto-cleanup)
egui_kittest = "0.34"   # headless egui interaction harness (no wgpu/snapshot feature)
approx = "0.5"          # float-tolerant assertions for color math
pollster = "0.4"        # block on wgpu async in headless GPU tests

# Patched exr: decompresses ZIP/PXR24 via miniz_oxide instead of zune-inflate,
# which panics (and aborts the app via a rayon worker) on some valid files.
# See https://github.com/byvfx/exrs/tree/miniz-inflate
[patch.crates-io]
exr = { git = "https://github.com/byvfx/exrs", branch = "miniz-inflate" }
