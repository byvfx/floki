# Convenience aliases for the self-contained (vendored) OpenColorIO build.
#
# OCIO is mandatory in floki — it is always compiled. A bare `cargo run` uses the
# lightweight `system-ocio` backend (the default feature), linking an installed
# OCIO and never triggering cmake.
#
# `cargo ocio-run` instead statically builds OCIO 2.4.2 from the
# `floki-ocio/vendor/OCIO` submodule via cmake, so nothing needs to be installed
# system-wide. The first build is slow (minutes) and then cached. These use
# `--no-default-features --features vendored` so only the vendored backend is
# selected (not both backends at once).
#
# Prerequisites: a C++ toolchain (MSVC "Desktop development with C++" on Windows;
# clang/gcc elsewhere), cmake >= 3.14, ninja, python3, and the OCIO submodule
# checked out (`git submodule update --init --recursive`, or use `just ocio`).
[alias]
ocio-run = "run --release --no-default-features --features vendored"
ocio-build = "build --release --no-default-features --features vendored"
ocio-test = "test --no-default-features --features vendored"
