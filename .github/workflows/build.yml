name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Still needed: actions/upload-artifact has no Node.js 24 release yet, so this
  # forces it onto Node 24 instead of emitting a Node 20 deprecation warning.
  # Remove once upload-artifact ships a node24 runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build & registry
        uses: Swatinem/rust-cache@v2

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libasound2-dev libudev-dev libgtk-3-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # GPU-free test suite: unit, import/integration, and headless egui_kittest
      # interaction tests. No graphics device is created, so no GPU/software
      # rasterizer is required on the runner.
      - name: Run tests
        run: cargo test --all-targets

  build:
    name: Build on ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable: floki
            artifact_name: floki-linux-x86_64
            release_file: floki-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: floki.exe
            artifact_name: floki-windows-x86_64
            release_file: floki-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            executable: floki
            artifact_name: floki-macos-arm64
            release_file: floki-macos-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libasound2-dev libudev-dev libgtk-3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.executable }}
          if-no-files-found: error

      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" \
             "target/${{ matrix.target }}/release/${{ matrix.release_file }}"

      # Pull this tag's section out of CHANGELOG.md (e.g. tag v1.4.3 -> the
      # `## [1.4.3]` block) so the GitHub Release body matches the changelog.
      # Fails the release if the section is missing, so a tag can't ship with
      # empty/auto notes. Runs on every matrix OS via git-bash.
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ {
              if (capture) exit
              if (index($0, "## [" ver "]") == 1) { capture=1; next }
            }
            capture && /^\[[^]]+\]: / { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No '## [$version]' section in CHANGELOG.md for tag $GITHUB_REF_NAME — add it before tagging." >&2
            exit 1
          fi
          echo "----- release notes for $version -----"
          cat release_notes.md

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.release_file }}
          body_path: release_notes.md
# Self-contained OCIO build: statically links OpenColorIO 2.4.2 (cmake-built from the
  # vendored submodule), so the binary runs on machines with no OCIO installed. cmake,
  # make/MSBuild and python are preinstalled on the runners; the only extra cost is the
  # one-time OCIO compile (cached by rust-cache between runs). These artifacts are not yet
  # wired into the GitHub Release — flip the `build` job over to them once this is proven green.
  build-ocio:
    name: OCIO vendored build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable: floki
            artifact_name: floki-linux-x86_64-ocio
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: floki.exe
            artifact_name: floki-windows-x86_64-ocio
          - os: macos-latest
            target: aarch64-apple-darwin
            executable: floki
            artifact_name: floki-macos-arm64-ocio

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libasound2-dev libudev-dev libgtk-3-dev

      # Caches the cargo registry/git and target/ — including the build-script OUT_DIR with the
      # compiled OCIO — so the expensive static build only reruns when build.rs / the submodule change.
      - name: Cache cargo & OCIO build
        uses: Swatinem/rust-cache@v2
        with:
          key: ocio-vendored

      # Functional smoke check of the vendored OCIO on every platform: loads a config and
      # generates a GPU shader bundle (GLSL->SPIR-V->WGSL). Validates the static OCIO links and
      # works, independent of a GPU (the on-device Metal test only runs on macOS).
      - name: OCIO smoke test (config load + shader transpile)
        run: cargo test -p floki-ocio --release --features vendored-ocio

      - name: Build app (vendored OCIO)
        run: cargo build --release --features ocio-vendored --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.executable }}
          if-no-files-found: error
