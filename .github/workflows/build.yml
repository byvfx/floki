name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable: exr-analyzer
            artifact_name: exr-analyzer-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: exr-analyzer.exe
            artifact_name: exr-analyzer-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            executable: exr-analyzer
            artifact_name: exr-analyzer-macos-arm64


    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libasound2-dev libudev-dev libgtk-3-dev

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.executable }}
        if-no-files-found: error

    - name: Rename binary for release
      run: |
        cp target/${{ matrix.target }}/release/${{ matrix.executable }} target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
      if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
      
    - name: Rename binary for release (Windows)
      run: |
        copy target\${{ matrix.target }}\release\${{ matrix.executable }} target\${{ matrix.target }}\release\${{ matrix.artifact_name }}.exe
      if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          target/${{ matrix.target }}/release/${{ matrix.artifact_name }}.exe

